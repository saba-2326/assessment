<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assessment.css">

  <title>あなたのいいところ診断</title>
</head>

<body>
  <h1>あなたのいいところは？</h1>
  <p>診断したい名前を入力してください</p>
  <input type="text" , id="userName" , size="40" , maxlength="20">
  <button id="assessment">診断する</button>

  <div id="result_area"></div>
  <div id="tweet_area">
    <!-- ツイートボタン -->
    <a href="https://twitter.com/intent/tweet?button_hashtag=あなたのいいところ&ref_src=twsrc%5Etfw" 
      class="twitter-hashtag-button" 
      data-text="診断結果の文章" 
      data-show-count="false">Tweet #あなたのいいところ</a>
      <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    </a>
  </div>

  <script src="assessment.js"></script>
</body>

</html>
